<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học tập</title>

    <link rel="stylesheet" href="../../Css/main.css">
    <link rel="stylesheet" href="../../Css/learning.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">CODELEARN</div>

    <ul class="menu">
        <li class="active">Học tập</li>
        <li>Luyện tập</li>
        <li>Sự kiện</li>
        <li>Giới thiệu</li>
        <li>Chia sẻ</li>
    </ul>

    <div class="auth">
        <a href="../account/login.html">Đăng nhập</a>
        <a href="../account/register.html" class="btn">Đăng ký</a>
    </div>
</div>

<!-- BANNER -->
<div class="banner">
    <h2>GIẢM GIÁ KHÓA HỌC</h2>
    <p>Ưu đãi lên tới 50%</p>
</div>

<!-- FILTER -->
<div class="filter">
    <input type="text" placeholder="Nhập nội dung tìm kiếm...">
    <button><i class="fas fa-search"></i></button>
</div>

<!-- COURSES -->
<div class="courses">

    <!-- CARD -->
    <div class="course-card">
        <img src="https://via.placeholder.com/250x140">
        <h4>Thuật toán cơ bản</h4>
        <p>⭐⭐⭐⭐⭐ 5.0</p>
        <span class="price">999.000đ</span>
    </div>

    <div class="course-card">
        <img src="https://via.placeholder.com/250x140">
        <h4>Python cơ bản</h4>
        <p>⭐⭐⭐⭐ 4.5</p>
        <span class="price">699.000đ</span>
    </div>

    <div class="course-card">
        <img src="https://via.placeholder.com/250x140">
        <h4>Algorithms nâng cao</h4>
        <p>⭐⭐⭐⭐ 4.2</p>
        <span class="price free">Miễn phí</span>
    </div>

</div>

</body>
</html>
